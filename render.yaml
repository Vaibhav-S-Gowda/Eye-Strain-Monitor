services:
  - type: web
    name: neural-nexus
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: MONGODB_URI
        sync: false  # You'll set this manually in the dashboard
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure key
      - key: PYTHON_VERSION
        value: 3.11.6
