<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Nexus — Analytics</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>
<div id="toast-container"></div>

<div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="logo-svg"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
            </div>
            <span class="logo-text">Neural Nexus</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="sidebar-link" title="Dashboard">
                <span class="s-icon">📊</span>
                <span class="s-label">Dashboard</span>
            </a>
            <a href="/real-time" class="sidebar-link" title="Real-Time">
                <span class="s-icon">👁️</span>
                <span class="s-label">Real-Time</span>
            </a>
            <a href="/camera" class="sidebar-link" title="Camera">
                <span class="s-icon">📷</span>
                <span class="s-label">Camera</span>
            </a>
            <a href="/analytics" class="sidebar-link active" title="Analytics">
                <span class="s-icon">📈</span>
                <span class="s-label">Analytics</span>
            </a>
            <a href="/timeline" class="sidebar-link" title="Timeline">
                <span class="s-icon">⏳</span>
                <span class="s-label">Timeline</span>
            </a>
        </nav>
        <div class="sidebar-bottom">
            <a href="/profile" class="sidebar-link" title="Profile">
                <div class="sidebar-avatar" id="sidebar-avatar-container">
                    <i class="fas fa-user-circle"></i>
                </div>
                <span class="s-label" id="sidebar-user-name">User</span>
            </a>
            <a href="/logout" class="sidebar-link logout" title="Logout">
                <span class="s-icon">🚪</span>
                <span class="s-label">Logout</span>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <div class="header-greeting">
                <h1>Deep Analytics</h1>
                <p class="sub-greeting">Long-term health trends and insights</p>
            </div>
            <div class="header-nav">
                <a href="/" class="pill">Dashboard</a>
                <a href="/real-time" class="pill">Real-Time</a>
                <a href="/camera" class="pill">Camera</a>
                <a href="/analytics" class="pill active">Analytics</a>
            </div>
        </header>

        <div class="content-grid" style="grid-template-columns: 1fr 1fr;">
            <!-- Heatmap -->
            <div class="chart-card heatmap-card">
                <div class="chart-card-header">
                    <h3>Consistency Heatmap</h3>
                    <p class="chart-sub">Your activity frequency over time</p>
                </div>
                <div id="heatmap-container" class="heatmap-container" style="height: 140px;"></div>
                <div class="heatmap-legend">
                    <span>Low</span>
                    <div class="legend-scale">
                        <span class="cell level-1"></span>
                        <span class="cell level-2"></span>
                        <span class="cell level-3"></span>
                        <span class="cell level-4"></span>
                    </div>
                    <span>High</span>
                </div>
            </div>

            <!-- Weekly Progress -->
            <div class="chart-card">
                <div class="chart-card-header">
                    <h3>Weekly Progress</h3>
                </div>
                <div class="chart-wrap" style="height: 200px;">
                    <canvas id="weeklyChart"></canvas>
                </div>
            </div>

            <!-- Map Section -->
            <div class="chart-card" style="grid-column: span 2;">
                <div class="chart-card-header">
                    <h3>Nearby Eye Specialists</h3>
                    <button id="locate-btn" class="btn-primary">Locate Me</button>
                </div>
                <div id="map-container" class="map-container" style="height: 300px;"></div>
                <div id="map-status" class="map-status"></div>
            </div>
        </div>
    </main>
</div>

<script src="/static/dashboard.js"></script>
</body>
</html>
